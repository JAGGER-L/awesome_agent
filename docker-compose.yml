services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: awesome_agent
      POSTGRES_USER: awesome_agent
      POSTGRES_PASSWORD: awesome_agent
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awesome_agent -d awesome_agent"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - awesome_agent_postgres:/var/lib/postgresql/data

volumes:
  awesome_agent_postgres:

